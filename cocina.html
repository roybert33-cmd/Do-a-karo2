<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocina - Doña Karo</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--rojo:#E63946;--azul:#1D3557;--amarillo:#FFB703;--bg:#F8FAFC}
  *{box-sizing:border-box} body{margin:0;font-family:'Inter',sans-serif;background:var(--bg)}
  header{background:var(--azul);color:white;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
  header h1{margin:0;font-family:'Fredoka';font-size:20px} button{cursor:pointer}
  .wrap{padding:14px;max-width:1100px;margin:auto}
  .stats{display:flex;gap:10px;margin-bottom:14px} .stat{flex:1;background:white;border-radius:14px;padding:12px 14px;box-shadow:0 2px 10px #0001}
  .stat b{font-size:28px;display:block;font-family:'Fredoka'} .stat span{font-size:11px;color:#666;letter-spacing:.8px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .card{background:white;border-radius:18px;padding:16px;box-shadow:0 4px 16px #0001;border-left:7px solid var(--azul);animation:pop .25s;transition:.3s}
  @keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .card.listo{border-left-color:#16a34a;background:#F0FDF4;animation:alerta 1s infinite alternate}
  @keyframes alerta{from{box-shadow:0 4px 16px #0001}to{box-shadow:0 8px 24px #16a34a44}}
  .card h2{margin:0;font-family:'Fredoka';font-size:36px;color:var(--azul)}
  .btn{width:100%;padding:14px;border:none;border-radius:12px;font-weight:800;font-size:16px;margin-top:12px}
  .btn-avisar{background:var(--amarillo);color:var(--azul)} .btn-listo{background:#16a34a;color:white}
  .vacio{text-align:center;padding:60px 20px;color:#888}
</style>
</head>
<body>
<header><h1>🍳 Cocina Doña Karo</h1><button onclick="reiniciarTodo()" style="background:white;color:var(--azul);border:none;padding:10px 16px;border-radius:10px;font-weight:800">♻️ Reiniciar día</button></header>
<div class="wrap">
  <div class="stats">
    <div class="stat"><b id="c-espera">0</b><span>EN ESPERA</span></div>
    <div class="stat"><b id="c-listo">0</b><span>AVISADOS</span></div>
    <div class="stat"><b id="c-hora">--:--</b><span>HORA</span></div>
  </div>
  <div id="lista" class="grid"></div>
  <div id="vacio" class="vacio">🎉<br>Sin pedidos pendientes</div>
</div>
<audio id="beep" preload="auto" src="https://cdn.pixabay.com/audio/2022/03/15/audio_58b8d6a5a8.mp3"></audio>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, onValue, update, set, get, remove } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app-check.js";
const firebaseConfig = { apiKey: "AIzaSyB9kLWRc6t7_XNBhlC10a4jmtbCntxOEYo", authDomain: "avisador-arayapp.firebaseapp.com", databaseURL: "https://avisador-arayapp-default-rtdb.firebaseio.com", projectId: "avisador-arayapp", storageBucket: "avisador-arayapp.firebasestorage.app", messagingSenderId: "337997002279", appId: "1:337997002279:web:6dc307a6e474432e64c002" };
const app = initializeApp(firebaseConfig);
initializeAppCheck(app, { provider: new ReCaptchaV3Provider('6LcPPFEtAAAAAIVtKgVFo1jtAQWRESDHHnCjMKaE'), isTokenAutoRefreshEnabled: true });
const db=getDatabase(app);const auth=getAuth(app);const RUTA_BASE='dona_karo';
const listaEl=document.getElementById("lista");const vacioEl=document.getElementById("vacio");const beep=document.getElementById("beep");

function hora(ts){return new Date(ts).toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})}

signInAnonymously(auth).then(()=>{
  setInterval(()=>{document.getElementById("c-hora").innerText=new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})},1000);
  
  onValue(ref(db,`${RUTA_BASE}/pedidos`), (snap)=>{
    listaEl.innerHTML="";let espera=0,listo=0;let pedidos=[];
    snap.forEach(c=>{pedidos.push({id:c.key,...c.val()})});
    pedidos.sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));
    
    // ARREGLO: Oculta automaticamente los ENTREGADO, asi no se queda pegado como en tu foto
    const visibles = pedidos.filter(p=>p.estado!=="ENTREGADO");
    
    if(visibles.length===0){vacioEl.style.display="block"}else{vacioEl.style.display="none"}

    visibles.forEach(p=>{
      if(p.estado==="ESPERA") espera++; if(p.estado==="LISTO") listo++;
      const div=document.createElement("div");div.className="card"+(p.estado==="LISTO"?" listo":"");
      const tiempoAvisado = p.timestamp_listo ? Math.floor((Date.now() - p.timestamp_listo)/1000) : 0;
      div.innerHTML=`<div><small style="color:#888">PEDIDO</small><h2>#${p.id}</h2><small>${p.estado}${p.estado==="LISTO" ? ` hace ${tiempoAvisado}s` : ""}</small><div style="font-size:12px;color:#888;margin-top:6px">🕒 ${hora(p.timestamp)}</div></div>
        ${p.estado==="ESPERA"?`<button class="btn btn-avisar" onclick="avisar('${p.id}')">🔔 AVISAR AL CLIENTE</button>`:`<button class="btn btn-listo">✅ Avisado - Se borra en ${Math.max(0,25-tiempoAvisado)}s</button>`}`;
      listaEl.appendChild(div);
    });
    document.getElementById("c-espera").innerText=espera;document.getElementById("c-listo").innerText=listo;
    const ultimo=visibles[visibles.length-1];
    if(ultimo && ultimo.estado==="ESPERA" && Date.now()-ultimo.timestamp<6000){beep.play().catch(()=>{})}
  });
});

window.avisar=async(id)=>{
  // 1. Pasa a LISTO y suena en el cliente
  await update(ref(db,`${RUTA_BASE}/pedidos/${id}`),{estado:"LISTO",timestamp_listo:Date.now()});
  
  // 2. ARREGLO AUTOMATICO: A los 25 segundos se pasa solo a ENTREGADO y desaparece de cocina
  // Asi el cliente tiene tiempo de ir a retirar y no se queda pegado en "Esperando retiro"
  setTimeout(async()=>{
    try{
      await update(ref(db,`${RUTA_BASE}/pedidos/${id}`),{estado:"ENTREGADO"});
      // Opcional: Borrarlo a los 5 seg más para limpiar base de datos
      setTimeout(async()=>{ try{await remove(ref(db,`${RUTA_BASE}/pedidos/${id}`))}catch(e){} },5000);
    }catch(e){}
  },25000);
};

window.reiniciarTodo=async()=>{
  if(!confirm("¿Borrar TODOS los pedidos y desbloquear clientes?")) return;
  const snap=await get(ref(db,`${RUTA_BASE}/pedidos`));
  if(snap.exists()){
    const promesas=[];snap.forEach(c=>{promesas.push(remove(ref(db,`${RUTA_BASE}/pedidos/${c.key}`)))});
    await Promise.all(promesas);
  }
  await set(ref(db,`${RUTA_BASE}/config/ultimo_reinicio`),Date.now());
  alert("Día reiniciado");
};
</script>
</body>
</html>
