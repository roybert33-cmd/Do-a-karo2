<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina - Doña Karo</title>
    <link rel="stylesheet" href="diseno.css">
</head>
<body>
    <div class="contenedor">
        <h1>Panel de Cocina - Doña Karo</h1>
        <div id="monitor-numero-cocina" style="font-size: 50px; font-weight: bold; margin: 20px;">#0</div>
        <button class="boton-accion" onclick="window.siguientePedidoListo()">🔔 Avisar Siguiente Pedido</button>
        <br><br>
        <button onclick="window.reiniciarContador()" style="background-color: #D52B1E; color: white; padding: 15px; border-radius: 8px; border:none; font-weight:bold; font-size:16px;">🔄 REINICIAR TODO (Contador, Pedidos, QRs y Celulares)</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app-check.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB9kLWRc6t7_XNBhlC10a4jmtbCntxOEYo",
            authDomain: "avisador-arayapp.firebaseapp.com",
            databaseURL: "https://avisador-arayapp-default-rtdb.firebaseio.com",
            projectId: "avisador-arayapp",
            storageBucket: "avisador-arayapp.firebasestorage.app",
            messagingSenderId: "337997002279",
            appId: "1:337997002279:web:6dc307a6e474432e64c002"
        };

        const app = initializeApp(firebaseConfig);
        initializeAppCheck(app, {
            provider: new ReCaptchaV3Provider('6LcPPFEtAAAAAIVtKgVFo1jtAQWRESDHHnCjMKaE'),
            isTokenAutoRefreshEnabled: true
        });
        const db = getDatabase(app);
        const auth = getAuth(app);
        const RUTA_BASE = 'dona_karo';

        signInAnonymously(auth).then(() => {
            let contadorGlobal = 0;
            onValue(ref(db, `${RUTA_BASE}/contador_global`), (snapshot) => {
                const data = snapshot.val();
                contadorGlobal = (data && data.valor !== undefined) ? parseInt(data.valor) : 0;
                document.getElementById("monitor-numero-cocina").innerText = "#" + contadorGlobal;
            });

            window.siguientePedidoListo = () => {
                let nuevoNumero = contadorGlobal + 1;
                set(ref(db, `${RUTA_BASE}/contador_global`), { valor: nuevoNumero });
                set(ref(db, `${RUTA_BASE}/pedidos/` + nuevoNumero), { estado: "LISTO", timestamp: Date.now() });
            };

            window.reiniciarContador = async () => {
                if(confirm("¿Seguro que quieres borrar TODO? \n\n- Contador a 0\n- Pedidos 1,2,3\n- QR Activos y Usados\n- Desbloquear TODOS los celulares")) {
                    try {
                        await set(ref(db, `${RUTA_BASE}/contador_global`), { valor: 0 });
                        await set(ref(db, `${RUTA_BASE}/pedidos`), null);
                        await set(ref(db, `${RUTA_BASE}/qr_activos`), null);
                        await set(ref(db, `${RUTA_BASE}/qr_usados`), null);
                        await set(ref(db, `${RUTA_BASE}/config/ultimo_reinicio`), { timestamp: Date.now() });
                        alert("✅ Doña Karo reiniciado completo");
                    } catch(e) {
                        alert("Error: " + e.message);
                    }
                }
            };
        });
    </script>
</body>
</html>
