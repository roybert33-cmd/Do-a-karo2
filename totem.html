<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totem QR - Doña Karo</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  body{text-align:center;font-family:sans-serif;padding:20px; background: white;}
  #qrcode{display:flex;justify-content:center;margin:20px}
  #log{color:#c00; font-size: 12px; white-space: pre-wrap;}
  #estado{font-size: 22px; font-weight: bold; color: #16a34a;}
</style>
</head>
<body>
<h1>ESCANEA PARA PEDIR</h1>
<div id="qrcode"></div>
<p id="estado">Generando QR...</p>
<p id="log"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app-check.js";

const firebaseConfig = { apiKey: "AIzaSyB9kLWRc6t7_XNBhlC10a4jmtbCntxOEYo", authDomain: "avisador-arayapp.firebaseapp.com", databaseURL: "https://avisador-arayapp-default-rtdb.firebaseio.com", projectId: "avisador-arayapp", storageBucket: "avisador-arayapp.firebasestorage.app", messagingSenderId: "337997002279", appId: "1:337997002279:web:6dc307a6e474432e64c002" };
const app = initializeApp(firebaseConfig);
const appCheck = initializeAppCheck(app, {
  provider: new ReCaptchaV3Provider('6LcPPFEtAAAAAIVtKgVFo1jtAQWRESDHHnCjMKaE'),
  isTokenAutoRefreshEnabled: true
});
const db = getDatabase(app); 
const auth = getAuth(app);
const RUTA_BASE = 'dona_karo';

let desuscribirAnterior = null;
let tokenActual = null;

signInAnonymously(auth).then(async ()=>{
  // Espera a que AppCheck tenga token
  await new Promise(r => setTimeout(r, 800));

  async function generarQR(){
    if(desuscribirAnterior){
        desuscribirAnterior();
        desuscribirAnterior = null;
    }

    tokenActual = "t" + Date.now() + Math.floor(Math.random()*9999);
    const tokenDeEstaVuelta = tokenActual;
    
    const baseUrl = location.href.substring(0, location.href.lastIndexOf('/') + 1);
    const url = baseUrl + "cliente.html?token=" + tokenDeEstaVuelta;
    
    document.getElementById("qrcode").innerHTML="";
    new QRCode(document.getElementById("qrcode"), { text: url, width: 300, height: 300 });

    try{
        await set(ref(db, `${RUTA_BASE}/qr_activos/${tokenDeEstaVuelta}`), { expira: Date.now() + 120000 });
        document.getElementById("estado").innerText = "✅ QR LISTO - ESCANEA";
        document.getElementById("estado").style.color = "#16a34a";
        document.getElementById("log").innerText = tokenDeEstaVuelta;
    }catch(e){
        document.getElementById("estado").innerText = "❌ Error Firebase";
        document.getElementById("log").innerText = e.code + "\n" + e.message + "\n\nSi dice AppCheck, debes agregar 3-cmd.github.io en Firebase > AppCheck";
        console.error(e);
        return;
    }

    const tokenRef = ref(db, `${RUTA_BASE}/qr_activos/${tokenDeEstaVuelta}`);
    desuscribirAnterior = onValue(tokenRef, (snap) => {
        if(tokenDeEstaVuelta === tokenActual && !snap.exists()){
            document.getElementById("estado").innerText = "⚡ Escaneado, generando siguiente...";
            document.getElementById("estado").style.color = "#ea580c";
            if(desuscribirAnterior){
                desuscribirAnterior();
                desuscribirAnterior = null;
            }
            setTimeout(generarQR, 400);
        }
    });
  }
  generarQR();
});
</script>
</body>
</html>
