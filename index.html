<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totem QR - Doña Karo</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>body{text-align:center;font-family:sans-serif;padding:20px} #qrcode{display:flex;justify-content:center;margin:20px} #log{color:red}</style>
</head>
<body>
<h1>ESCANEA PARA PEDIR</h1>
<div id="qrcode"></div>
<p id="timer" style="font-size:20px;font-weight:bold"></p>
<p id="log"></p>
<p>Doña Karo</p>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
const firebaseConfig = { apiKey: "AIzaSyB9kLWRc6t7_XNBhlC10a4jmtbCntxOEYo", authDomain: "avisador-arayapp.firebaseapp.com", databaseURL: "https://avisador-arayapp-default-rtdb.firebaseio.com", projectId: "avisador-arayapp", storageBucket: "avisador-arayapp.firebasestorage.app", messagingSenderId: "337997002279", appId: "1:337997002279:web:6dc307a6e474432e64c002" };
const app = initializeApp(firebaseConfig); const db = getDatabase(app); const auth = getAuth(app);
const RUTA_BASE = 'dona_karo';
signInAnonymously(auth).then(()=>{
  function generarQR(){
    const token = "t" + Date.now() + Math.floor(Math.random()*9999);
    const expira = Date.now() + 120000;
    set(ref(db, `${RUTA_BASE}/qr_activos/${token}`), { expira: expira })
      .then(()=>{ document.getElementById("log").innerText = "QR OK: " + token; })
      .catch(e=>{ document.getElementById("log").innerText = "ERROR FIREBASE: " + e.message; console.error(e); });
    const url = location.origin + location.pathname.replace('totem.html','cliente.html') + "?token=" + token;
    document.getElementById("qrcode").innerHTML="";
    new QRCode(document.getElementById("qrcode"), { text: url, width: 300, height: 300 });
    let seg=120; clearInterval(window.t); window.t=setInterval(()=>{ seg--; document.getElementById("timer").innerText=`Expira en ${seg}s`; if(seg<=0) generarQR(); },1000);
  }
  generarQR();
});
</script>
</body>
</html>
