<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente - Doña Karo</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
      :root{--rojo:#E63946;--azul:#1D3557;--amarillo:#FFB703;--bg:#FFF8F0}
      *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:'Inter',sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:16px}
      .contenedor{max-width:440px;width:100%;background:white;border-radius:28px;padding:24px;box-shadow:0 20px 50px #1D35571A;text-align:center;position:relative;overflow:hidden}
      .contenedor::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--rojo),var(--amarillo),var(--azul))}
      .brand{font-family:'Fredoka';color:var(--azul);font-size:18px;letter-spacing:1px;margin-bottom:4px} .brand span{color:var(--rojo)}
      h1{font-family:'Fredoka';font-size:26px;color:var(--azul);margin:6px 0 12px;line-height:1.1}
      #texto-pedido-dinamico{font-size:17px!important;font-weight:600;color:#444;background:#FFF8E1;padding:12px;border-radius:12px;border:1px dashed #FFB703}
      #numero-cliente-input{padding:16px!important;width:100%!important;border-radius:14px!important;border:2px solid #eee!important;font-size:22px!important;font-weight:800;text-align:center;outline:none;transition:.2s}
      #numero-cliente-input:focus{border-color:var(--amarillo)!important;box-shadow:0 0 0 4px #FFB70330}
      .boton-accion{background:var(--azul)!important;width:100%!important;border-radius:14px!important;padding:16px!important;font-size:17px!important;box-shadow:0 8px 20px #1D355730;transition:.2s}
      .boton-accion:active{transform:scale(.97)}
      #estado-pantalla{font-weight:700;color:var(--azul);background:#F1F5F9;padding:12px;border-radius:12px;min-height:50px;display:flex;align-items:center;justify-content:center}
      .video-cueca{width:100%;border-radius:16px;margin-top:16px;max-height:280px;object-fit:cover}
      #boton-cerrar{width:100%;border-radius:12px!important}
    </style>
</head>
<body>
    <div class="contenedor" id="contenedor-principal">
        <div class="brand">DOÑA <span>KARO</span></div>
        <h1>Retiro de Pedidos</h1>
        <div id="pantalla-registro">
            <p id="texto-pedido-dinamico">Te avisaremos cuando tu pedido esté listo</p>
            <input type="number" id="numero-cliente-input" placeholder="Tu número de ticket" oninput="actualizarNumeroTexto()">
            <button class="boton-accion" onclick="activarMiPedido()">🔔 Activar alerta con sonido</button>
            <p style="font-size:11px; color:#888; margin-top:14px; line-height:1.3;">Al activar aceptas nuestra <a href="https://arayapp.cl/privacidad" target="_blank" style="color:var(--azul); font-weight:700;">Política de Privacidad</a>.</p>
        </div>
        <div id="estado-pantalla">Validando acceso...</div>
        <button id="boton-cerrar" style="display:none; margin-top: 20px; padding: 15px 30px; background-color: #D52B1E; color: white; border: none; border-radius: 5px; font-size: 18px;" onclick="window.location.reload()">Cerrar Página</button>
        <video id="video-cueca" class="video-cueca" style="display:none;" loop muted playsinline preload="auto"><source src="video.mp4" type="video/mp4"></video>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, onValue, off, update, set, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app-check.js";

const firebaseConfig = {
    apiKey: "AIzaSyB9kLWRc6t7_XNBhlC10a4jmtbCntxOEYo",
    authDomain: "avisador-arayapp.firebaseapp.com",
    databaseURL: "https://avisador-arayapp-default-rtdb.firebaseio.com",
    projectId: "avisador-arayapp", storageBucket: "avisador-arayapp.firebasestorage.app",
    messagingSenderId: "337997002279", appId: "1:337997002279:web:6dc307a6e474432e64c002"
};
const app = initializeApp(firebaseConfig);
initializeAppCheck(app, { provider: new ReCaptchaV3Provider('6LcPPFEtAAAAAIVtKgVFo1jtAQWRESDHHnCjMKaE'), isTokenAutoRefreshEnabled: true });
const db = getDatabase(app); 
const auth = getAuth(app);
let audioCtx = null; 
let intervaloAlarma = null; 
let wakeLock = null;

const KEY_BLOQUEO = 'dona_karo_ticket_bloqueado';
const KEY_FECHA = 'dona_karo_fecha';
const RUTA_BASE = 'dona_karo';

window.actualizarNumeroTexto = () => {
    const val = document.getElementById("numero-cliente-input").value;
    const textoEl = document.getElementById("texto-pedido-dinamico");
    if(val) textoEl.innerText = `Te avisaremos cuando tu pedido #${val} esté listo`;
    else textoEl.innerText = `Te avisaremos cuando tu pedido esté listo`;
}

function verificarBloqueoInicial() {
    const ticketGuardado = localStorage.getItem(KEY_BLOQUEO);
    const fechaGuardada = localStorage.getItem(KEY_FECHA);
    const hoy = new Date().toDateString();
    if (!ticketGuardado) return null;
    if (fechaGuardada !== hoy) {
        localStorage.removeItem(KEY_BLOQUEO);
        localStorage.removeItem(KEY_FECHA);
        return null;
    }
    document.getElementById("pantalla-registro").style.display="none"; 
    document.getElementById("texto-pedido-dinamico").innerText = `Te avisaremos cuando tu pedido #${ticketGuardado} esté listo`;
    document.getElementById("estado-pantalla").innerHTML="<h3>⏳ Pedido #"+ticketGuardado+" en curso</h3><p style='font-size:13px;color:#666'>Sonido reactivado con este nuevo QR</p>"; 
    return ticketGuardado;
}

signInAnonymously(auth).then(async () => {
    const params = new URLSearchParams(location.search);
    const tokenURL = params.get('token');
    
    if(!tokenURL){
        document.getElementById("contenedor-principal").innerHTML = "<div style='text-align:center;padding:40px;'><h1 style='font-size:50px'>⛔</h1><h2 style='font-family:Fredoka;color:#1D3557'>Acceso denegado</h2><p style='font-size:16px'>Debes escanear el QR que está en caja.</p><p style='color:#666;font-size:13px'>No puedes ingresar escribiendo el link ni recargando.</p></div>";
        return;
    }

    const snapToken = await get(ref(db, `${RUTA_BASE}/qr_activos/${tokenURL}`));
    if(!snapToken.exists()){
        document.getElementById("contenedor-principal").innerHTML = "<div style='text-align:center;padding:30px;'><h2 style='font-family:Fredoka'>QR Inválido</h2><p>Este QR no existe o ya fue usado.<br>Escanea el QR nuevo que está en caja.</p></div>";
        return;
    }
    if(snapToken.val().expira < Date.now()){
        await set(ref(db, `${RUTA_BASE}/qr_activos/${tokenURL}`), null);
        document.getElementById("contenedor-principal").innerHTML = "<div style='text-align:center;padding:30px;'><h2 style='font-family:Fredoka'>QR Expirado</h2><p>El QR dura solo 2 minutos.<br>Escanea de nuevo.</p></div>";
        return;
    }

    await set(ref(db, `${RUTA_BASE}/qr_activos/${tokenURL}`), null);
    await set(ref(db, `${RUTA_BASE}/qr_usados/${tokenURL}`), { usado: Date.now() });

    onValue(ref(db, `${RUTA_BASE}/config/ultimo_reinicio`), (snap) => {
        if(snap.exists() && localStorage.getItem(KEY_BLOQUEO)){
            localStorage.removeItem(KEY_BLOQUEO);
            localStorage.removeItem(KEY_FECHA);
            location.reload();
        }
    });

    let ticketBloqueado = verificarBloqueoInicial();
    if(!ticketBloqueado) document.getElementById("estado-pantalla").innerText="Escribe tu número...";

    function sonarUnaVezFuerte(){
        try{
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state==='suspended') audioCtx.resume();
            let o=audioCtx.createOscillator(); let g=audioCtx.createGain();
            o.frequency.setValueAtTime(1000, audioCtx.currentTime);
            g.gain.setValueAtTime(1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.7);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.7);
            if("vibrate" in navigator) navigator.vibrate([800,200,800]);
        }catch(e){}
    }

    window.activarMiPedido = async () => {
        const inputVal = document.getElementById("numero-cliente-input").value;
        if(!inputVal) return alert("Ingresa número");
        if(localStorage.getItem(KEY_BLOQUEO) && localStorage.getItem(KEY_BLOQUEO)!==inputVal){ alert("Ya tienes pedido #"+localStorage.getItem(KEY_BLOQUEO)+" activo hoy."); return; }
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        await audioCtx.resume();
        let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
        gain.gain.value=0; osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+0.1);
        if("vibrate" in navigator) navigator.vibrate(100);
        if("wakeLock" in navigator) try{ wakeLock = await navigator.wakeLock.request('screen'); }catch(e){}
        if("Notification" in window && Notification.permission==="default") Notification.requestPermission();
        localStorage.setItem(KEY_BLOQUEO, inputVal);
        localStorage.setItem(KEY_FECHA, new Date().toDateString());
        document.getElementById("pantalla-registro").style.display="none";
        document.getElementById("estado-pantalla").innerText="Esperando pedido #"+inputVal+" 🔊 Activo";
        const pedidoRef = ref(db, `${RUTA_BASE}/pedidos/` + inputVal);
        const snapExist = await get(pedidoRef);
        if(!snapExist.exists()){
            await set(pedidoRef, { estado: "ESPERA", timestamp: Date.now() });
        } else {
            if(snapExist.val().estado === "ENTREGADO"){
                await update(pedidoRef, { estado: "ESPERA", timestamp: Date.now() });
            }
        }
        onValue(pedidoRef, (snapshot) => {
            const data = snapshot.val();
            if(!data){
                localStorage.removeItem(KEY_BLOQUEO);
                localStorage.removeItem(KEY_FECHA);
                location.reload();
                return;
            }
            if(data && data.estado==="LISTO"){
                document.getElementById("estado-pantalla").innerHTML="<h2 style='font-family:Fredoka;color:#E63946'>¡PEDIDO #"+inputVal+" LISTO! - DOÑA KARO</h2>";
                document.getElementById("video-cueca").style.display="block"; document.getElementById("video-cueca").play().catch(()=>{});
                sonarUnaVezFuerte();
                let contadorBeep = 0;
                if(intervaloAlarma) clearInterval(intervaloAlarma);
                intervaloAlarma = setInterval(()=>{
                    if(audioCtx.state==='suspended') audioCtx.resume();
                    sonarUnaVezFuerte();
                    contadorBeep++;
                    document.body.style.background = (contadorBeep%2===0) ? "#ff0000" : "#FFF8F0";
                    if(contadorBeep>30){ clearInterval(intervaloAlarma); document.body.style.background=""; }
                }, 1500);
                update(pedidoRef, { estado: "ENTREGADO" });
                off(pedidoRef);
                setTimeout(()=>{
                    if(intervaloAlarma) clearInterval(intervaloAlarma);
                    document.body.style.background="";
                    document.getElementById("estado-pantalla").innerHTML="<h3>Pedido Entregado.</h3>";
                    document.getElementById("video-cueca").style.display="none";
                    document.getElementById("boton-cerrar").style.display="inline-block";
                    if(wakeLock) wakeLock.release();
                }, 30000);
            }
        });
    };

    if(ticketBloqueado){
        const pedidoRef = ref(db, `${RUTA_BASE}/pedidos/` + ticketBloqueado);
        onValue(pedidoRef, (snapshot) => {
            const data = snapshot.val();
            if(!data){
                localStorage.removeItem(KEY_BLOQUEO);
                localStorage.removeItem(KEY_FECHA);
                return;
            }
            if(data && data.estado==="LISTO"){
                document.getElementById("estado-pantalla").innerHTML="<h2 style='font-family:Fredoka;color:#E63946'>¡PEDIDO #"+ticketBloqueado+" LISTO! - DOÑA KARO</h2>";
                document.getElementById("video-cueca").style.display="block"; document.getElementById("video-cueca").play().catch(()=>{});
            }
        });
    }
});
</script>
</body>
</html>
